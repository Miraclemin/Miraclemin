name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate stats SVG
        run: |
          node scripts/generate-github-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Miraclemin
          OUTPUT_PATH: assets/github-stats.svg

      - name: Commit updated SVG
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- assets/github-stats.svg)" ]; then
            echo "Stats card unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg
          git commit -m "chore: update github stats"
          git push
