<?xml version="1.0" encoding="UTF-8"?>
<svg width="460" height="420" viewBox="0 0 460 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Miraclemin GitHub Stats</title>
  <desc id="desc">Daily generated GitHub profile statistics card for Miraclemin.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="24" x2="436" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117" />
      <stop offset="1" stop-color="#161B22" />
    </linearGradient>
    <linearGradient id="accent" x1="36" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" />
      <stop offset="1" stop-color="#79C0FF" />
    </linearGradient>
  </defs>
  <style>
    .title { font: 700 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #f0f6fc; }
    .subtitle { font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
    .label { font: 600 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
    .value { font: 700 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #f0f6fc; }
    .footer { font: 400 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
  </style>
  <rect x="12" y="12" width="436" height="396" rx="20" fill="url(#bg)" stroke="#30363d" />
  <text x="36" y="58" class="title">Miraclemin GitHub Stats</text>
  <text x="36" y="84" class="subtitle">Generated daily with GitHub Actions</text>
  <rect x="36" y="96" width="180" height="4" rx="2" fill="url(#accent)" />
  
    <g transform="translate(36 116)">
      <circle cx="6" cy="-5" r="6" fill="#2f81f7" opacity="0.85" />
      <text x="24" y="0" class="label">Public Repos</text>
      <text x="408" y="0" class="value" text-anchor="end">97</text>
    </g>
    <g transform="translate(36 164)">
      <circle cx="6" cy="-5" r="6" fill="#2f81f7" opacity="0.85" />
      <text x="24" y="0" class="label">Followers</text>
      <text x="408" y="0" class="value" text-anchor="end">30</text>
    </g>
    <g transform="translate(36 212)">
      <circle cx="6" cy="-5" r="6" fill="#2f81f7" opacity="0.85" />
      <text x="24" y="0" class="label">Total Stars</text>
      <text x="408" y="0" class="value" text-anchor="end">35</text>
    </g>
    <g transform="translate(36 260)">
      <circle cx="6" cy="-5" r="6" fill="#2f81f7" opacity="0.85" />
      <text x="24" y="0" class="label">Pull Requests</text>
      <text x="408" y="0" class="value" text-anchor="end">13</text>
    </g>
    <g transform="translate(36 308)">
      <circle cx="6" cy="-5" r="6" fill="#2f81f7" opacity="0.85" />
      <text x="24" y="0" class="label">Issues</text>
      <text x="408" y="0" class="value" text-anchor="end">6</text>
    </g>
    <g transform="translate(36 356)">
      <circle cx="6" cy="-5" r="6" fill="#2f81f7" opacity="0.85" />
      <text x="24" y="0" class="label">Following</text>
      <text x="408" y="0" class="value" text-anchor="end">33</text>
    </g>
  <text x="36" y="388" class="footer">Source: GitHub API</text>
</svg>